name: Automasi Pembaruan README

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Mengunduh Repositori
        uses: actions/checkout@v4

      - name: Konfigurasi Lingkungan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Eksekusi Skrip Pembaruan
        run: node scripts/sync-latest-releases.js

      - name: Simpan dan Unggah Perubahan
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: memperbarui daftar anime rilis terbaru secara otomatis" || echo "Tidak ada perubahan data yang perlu disimpan"
          git push